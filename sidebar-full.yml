                - paragraph [ref=e1239]: COMPRANET — el portal de contrataciones federales y fuente de los 3.1M contratos aquí — fue abolido por el Congreso el 10 de abril de 2025. Antes de cualquier cambio legal, 1.9 millones de contratos de 2012–2023 ya habían sido eliminados del acceso público en agosto de 2024. El INAI, organismo independiente de transparencia, fue eliminado constitucionalmente en diciembre de 2024. Los 3.1M contratos de esta base de datos fueron capturados antes de estos cambios y pueden ser uno de los registros más completos del historial de contrataciones federales de México.
