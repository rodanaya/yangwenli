# RUBLI Production Deployment
# Uses the optimized deploy database (~2.4 GB vs 6 GB)
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Prerequisites:
#   1. Copy .env.prod.example → .env.prod and set CORS_ORIGINS + ACME_EMAIL
#   2. Ensure backend/RUBLI_DEPLOY.db exists (run: python backend/scripts/create_deploy_db.py)
#   3. Point rubli.site DNS A record → server IP before starting (Caddy needs domain reachable)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rubli-backend
    volumes:
      - ./backend/RUBLI_DEPLOY.db:/app/RUBLI_DEPLOY.db
    environment:
      - PYTHONPATH=/app
      - DATABASE_PATH=/app/RUBLI_DEPLOY.db
      # Set CORS_ORIGINS in .env.prod (e.g. https://rubli.site)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '2'
    networks:
      - rubli-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rubli-frontend
    # No host port binding — Caddy proxies to this container internally
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
    networks:
      - rubli-network

  caddy:
    image: caddy:2-alpine
    container_name: rubli-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Persists TLS certificates across restarts
      - caddy_config:/config
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@rubli.site}
    depends_on:
      - frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
    networks:
      - rubli-network

  aria-cron:
    image: docker:cli
    container_name: rubli-aria-cron
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Run ARIA pipeline daily at 03:00 UTC via docker exec into the backend container.
    # Uses sh + while-sleep loop (no cron daemon needed, simpler than alpine/cron).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "ARIA cron scheduler started — will run daily at 03:00 UTC"
        while true; do
          # Calculate seconds until next 03:00 UTC
          now=$$(date -u +%s)
          target=$$(date -u -d "tomorrow 03:00" +%s 2>/dev/null || date -u -d "$$(date -u +%Y-%m-%d) 03:00" +%s)
          if [ "$$target" -le "$$now" ]; then
            target=$$(( $$target + 86400 ))
          fi
          wait_secs=$$(( $$target - $$now ))
          next_run=$$(date -u -d "@$$target" '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo "in $${wait_secs}s")
          echo "Next ARIA run at $$next_run (sleeping $${wait_secs}s)"
          sleep $$wait_secs
          echo "$$(date -u '+%Y-%m-%d %H:%M:%S UTC') — Triggering ARIA daily pipeline"
          docker exec rubli-backend sh /app/scripts/aria_cron.sh || echo "ARIA cron run failed"
        done
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    networks:
      - rubli-network

volumes:
  caddy_data:
  caddy_config:

networks:
  rubli-network:
    driver: bridge
