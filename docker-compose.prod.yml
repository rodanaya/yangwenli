# RUBLI Production Deployment
# Uses the optimized deploy database (~2.4 GB vs 6 GB)
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Prerequisites:
#   1. Copy .env.prod.example → .env.prod and set CORS_ORIGINS + ACME_EMAIL
#   2. Ensure backend/RUBLI_DEPLOY.db exists (run: python backend/scripts/create_deploy_db.py)
#   3. Point rubli.site DNS A record → server IP before starting (Caddy needs domain reachable)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rubli-backend
    volumes:
      - ./backend/RUBLI_DEPLOY.db:/app/RUBLI_DEPLOY.db
    environment:
      - PYTHONPATH=/app
      - DATABASE_PATH=/app/RUBLI_DEPLOY.db
      # Set CORS_ORIGINS in .env.prod (e.g. https://rubli.site)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - RUBLI_WRITE_KEY=${RUBLI_WRITE_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '2'
    networks:
      - rubli-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_RUBLI_WRITE_KEY=${RUBLI_WRITE_KEY:-}
    container_name: rubli-frontend
    # No host port binding — Caddy proxies to this container internally
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
    networks:
      - rubli-network

  magyar:
    build:
      context: ../magyar-study-app
      dockerfile: Dockerfile
    container_name: rubli-magyar
    environment:
      - SECRET_KEY=${MAGYAR_SECRET_KEY:-changeme}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - rubli-network

  caddy:
    image: caddy:2-alpine
    container_name: rubli-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Persists TLS certificates across restarts
      - caddy_config:/config
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@rubli.site}
    depends_on:
      - frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
    networks:
      - rubli-network

  aria-cron:
    # SECURITY: Docker socket removed.
    # Previously this service mounted /var/run/docker.sock:ro and used
    #   `docker exec rubli-backend sh /app/scripts/aria_cron.sh`
    # to trigger the ARIA pipeline.  Mounting the Docker socket grants
    # container-breakout-level access (full Docker API including image pulls,
    # container creation, and volume access), which violates least-privilege.
    #
    # Replacement: the cron container triggers the pipeline via an HTTP POST
    # to the backend's internal /api/v1/aria/run-pipeline endpoint, which is
    # only reachable inside rubli-network (not exposed to the public internet).
    # Authentication is enforced via the X-Rubli-Key header (RUBLI_WRITE_KEY).
    image: alpine:3.19
    container_name: rubli-aria-cron
    # No volume mounts — no socket, no DB access.
    environment:
      - RUBLI_WRITE_KEY=${RUBLI_WRITE_KEY:-}
      - BACKEND_URL=http://rubli-backend:8001
    # Run ARIA pipeline daily at 03:00 UTC via internal HTTP call.
    # Uses sh + while-sleep loop (no cron daemon needed, simpler than alpine/cron).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Install wget (busybox wget is built-in to alpine, no extra install needed)
        echo "ARIA cron scheduler started — will trigger daily at 03:00 UTC via HTTP"
        while true; do
          # Calculate seconds until next 03:00 UTC
          now=$$(date -u +%s)
          tomorrow=$$(date -u -d "tomorrow 03:00" +%s 2>/dev/null || \
            awk 'BEGIN{print systime() + 86400 - (systime() % 86400) + 10800}')
          if [ "$$tomorrow" -le "$$now" ]; then
            tomorrow=$$(( $$tomorrow + 86400 ))
          fi
          wait_secs=$$(( $$tomorrow - $$now ))
          echo "Next ARIA run in $${wait_secs}s"
          sleep $$wait_secs
          echo "$$(date -u '+%Y-%m-%d %H:%M:%S UTC') — Triggering ARIA daily pipeline via HTTP"
          wget -q -O - --header="X-Rubli-Key: $${RUBLI_WRITE_KEY}" \
               --post-data="" \
               "$${BACKEND_URL}/api/v1/aria/run-pipeline" \
            && echo "ARIA trigger sent" \
            || echo "ARIA HTTP trigger failed — check backend logs"
        done
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    networks:
      - rubli-network

  backup-cron:
    image: keinos/sqlite3:latest
    container_name: rubli-backup-cron
    volumes:
      - ./backend/RUBLI_DEPLOY.db:/db/RUBLI_DEPLOY.db:ro
      - rubli_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup cron started — daily at 02:00 UTC"
        while true; do
          now=$$(date -u +%s)
          target=$$(date -u -d "tomorrow 02:00" +%s 2>/dev/null || \
            python3 -c "import datetime,calendar; t=datetime.datetime.utcnow().replace(hour=2,minute=0,second=0,microsecond=0)+datetime.timedelta(days=1); print(int(calendar.timegm(t.timetuple())))" 2>/dev/null || \
            echo $$(( now + 86400 )) )
          if [ "$$target" -le "$$now" ]; then target=$$(( $$target + 86400 )); fi
          wait_secs=$$(( $$target - $$now ))
          echo "Next backup in $${wait_secs}s"
          sleep $$wait_secs
          stamp=$$(date -u +%Y%m%d_%H%M%S)
          echo "$$(date -u) — Starting backup rubli_$${stamp}.db"
          sqlite3 /db/RUBLI_DEPLOY.db ".backup /backups/rubli_$${stamp}.db" && \
            echo "Backup complete: rubli_$${stamp}.db" || \
            echo "Backup FAILED"
          # Rotate: keep only last 7 days
          find /backups -name 'rubli_*.db' -mtime +7 -delete 2>/dev/null || true
          echo "Rotation done — listing backups:"
          ls -lh /backups/rubli_*.db 2>/dev/null || echo "(no backups yet)"
        done
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - rubli-network

volumes:
  caddy_data:
  caddy_config:
  rubli_backups:

networks:
  rubli-network:
    driver: bridge
