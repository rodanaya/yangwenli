<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0a0f1a"/>

  <!-- Stylized R letterform -->
  <!-- Vertical stem -->
  <rect x="7" y="5" width="3.5" height="22" rx="1" fill="#e5e7eb"/>
  <!-- Top horizontal -->
  <rect x="7" y="5" width="12" height="3.2" rx="1" fill="#e5e7eb"/>
  <!-- Bowl curve (right side of R) -->
  <path d="M19 5 C24 5, 24 14, 19 14" stroke="#e5e7eb" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <!-- Middle bar -->
  <rect x="7" y="12.8" width="12" height="3" rx="1" fill="#e5e7eb"/>
  <!-- Diagonal leg -->
  <rect x="14" y="14" width="3.5" height="14" rx="1" fill="#e5e7eb" transform="rotate(-22 14 14)"/>

  <!-- Anomaly spike chart overlay (inside the bowl of the R) -->
  <!-- Small bar chart: 3 bars + 1 spike -->
  <rect x="13" y="9.5" width="1.2" height="2" rx="0.3" fill="#e5e7eb" opacity="0.35"/>
  <rect x="15" y="8.5" width="1.2" height="3" rx="0.3" fill="#e5e7eb" opacity="0.35"/>
  <rect x="17" y="6.2" width="1.2" height="5.3" rx="0.3" fill="#dc2626" opacity="0.9"/>
  <rect x="19" y="9" width="1.2" height="2.5" rx="0.3" fill="#e5e7eb" opacity="0.35"/>

  <!-- Live monitoring indicator -->
  <circle cx="26" cy="26" r="2.5" fill="#16a34a"/>
  <circle cx="26" cy="26" r="1.2" fill="#22c55e" opacity="0.6"/>
</svg>
