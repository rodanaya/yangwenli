  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.5" fill="#0d0f0e"/>
  <circle cx="16" cy="16" r="2.2" fill="#ffffff" opacity="0.95"/>

  <!-- Sector marker dots -->
