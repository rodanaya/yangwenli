<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d0f0e"/>
  <!-- Crimson glow at spike peak -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>
  <!-- Baseline (warm dark — subtle, not dominant) -->
  <line x1="3" y1="22" x2="29" y2="22" stroke="#1e2220" stroke-width="1.5"/>
  <!-- The spike — THE mark -->
  <polyline points="12,22 16,5 20,22"
    stroke="#dc2626" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="miter" fill="none"/>
  <!-- Peak: outer dot -->
  <circle cx="16" cy="5" r="2.5" fill="#dc2626"/>
  <!-- Peak: inner highlight -->
  <circle cx="16" cy="5" r="1.1" fill="#fda4af"/>
</svg>
