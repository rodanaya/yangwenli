server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed .gz files generated at build time (zero per-request CPU)
    gzip_static on;

    # Runtime gzip fallback (for files not pre-compressed, e.g. index.html, API proxy)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/xml+rss
        application/wasm image/svg+xml;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # TODO: remove 'unsafe-inline' from script-src once all inline event handlers are eliminated
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.wikipedia.org https://*.wikimedia.org; connect-src 'self' https://*.wikipedia.org https://*.wikimedia.org; font-src 'self' data:; object-src 'none'; base-uri 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy - forward to backend
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check proxy
    location = /health {
        proxy_pass http://backend:8001/health;
    }

    # GeoJSON files — explicit MIME type so browsers parse correctly
    location ~* \.geojson$ {
        add_header Content-Type "application/geo+json";
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
