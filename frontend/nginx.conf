# Rate limiting zones — defined at http context level (used by server block below)
# api_limit: 30 req/min for API endpoints (burst 20)
# issues_limit: 10 req/hour for public issue-submission endpoint (burst 5)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=issues_limit:1m rate=10r/h;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed .gz files generated at build time (zero per-request CPU)
    gzip_static on;

    # Runtime gzip fallback (for files not pre-compressed, e.g. index.html, API proxy)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/xml+rss
        application/wasm image/svg+xml;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection intentionally omitted — modern browsers ignore it;
    # setting "1; mode=block" triggers XSS auditor bugs in old Chromium builds.
    # The CSP below provides equivalent (and stronger) protection.
    # TODO: remove 'unsafe-inline' from script-src once all inline event handlers are eliminated
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https: https://*.wikipedia.org https://*.wikimedia.org; connect-src 'self' https://*.wikipedia.org https://*.wikimedia.org; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy - forward to backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Public issue submission — strict rate limit (10/hour, burst 5)
    location = /api/v1/issues {
        limit_req zone=issues_limit burst=5 nodelay;
        proxy_pass http://backend:8001/api/v1/issues;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check proxy
    location = /health {
        proxy_pass http://backend:8001/health;
    }

    # FastAPI docs — restricted to localhost/internal networks only in production.
    # Remove the allow/deny rules in local dev if you need browser access to /docs.
    location = /docs {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://backend:8001/docs;
        proxy_set_header Host $host;
    }
    location = /redoc {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://backend:8001/redoc;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://backend:8001/openapi.json;
        proxy_set_header Host $host;
    }

    # GeoJSON files — explicit MIME type so browsers parse correctly
    location ~* \.geojson$ {
        add_header Content-Type "application/geo+json";
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
