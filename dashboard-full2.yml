                - paragraph [ref=e418]: Acerca de ARIA
                - paragraph [ref=e419]: El Algoritmo Automatizado de Investigación de Riesgo (ARIA) combina puntuaciones de riesgo de ML, detección de anomalías, clasificación de patrones y referencias cruzadas de registros externos (EFOS, SFP, RUPC) para clasificar proveedores según la Puntuación de Prioridad de Investigación (IPS). Las notas editoriales se generan previamente mediante síntesis asistida por LLM de señales de contratación.
                - paragraph [ref=e420]: Las puntuaciones de IPS son indicadores de riesgo, no veredictos de corrupción. Las puntuaciones altas indican similitud estadística con patrones de corrupción documentados y justifican una investigación más profunda.
