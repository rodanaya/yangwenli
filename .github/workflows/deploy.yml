name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts

      - name: Sync code to server (no DB)
        run: |
          rsync -az --delete \
            --exclude='backend/RUBLI_NORMALIZED.db*' \
            --exclude='backend/RUBLI_DEPLOY.db*' \
            --exclude='backend/*.db.backup*' \
            --exclude='backend/original_data/' \
            --exclude='frontend/node_modules/' \
            --exclude='frontend/dist/' \
            --exclude='.git/' \
            --exclude='*.pyc' \
            --exclude='__pycache__/' \
            . \
            root@${{ secrets.HETZNER_IP }}:/opt/rubli/

      - name: Rebuild and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/rubli
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            docker compose -f docker-compose.prod.yml ps

      - name: Health check
        run: |
          echo "Waiting 30s for containers to start..."
          sleep 30
          curl -fsS http://${{ secrets.HETZNER_IP }}/api/v1/health \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)
